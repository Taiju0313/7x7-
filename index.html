<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Calculator 😈</title>

<style>
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

/* Calculator */
.calculator {
  background: #111;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

/* TITLE BACK 🔥 */
h2 {
  margin-bottom: 10px;
  color: #00ffcc;
}

#display {
  width: 100%;
  height: 60px;
  font-size: 24px;
  text-align: right;
  padding: 10px;
  background: #000;
  color: #0f0;
  border: none;
  margin-bottom: 15px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 70px);
  gap: 10px;
}

button {
  height: 60px;
  border: none;
  border-radius: 12px;
  background: #222;
  color: white;
  font-size: 18px;
  transition: 0.2s;
}

button:active {
  transform: scale(0.9);
}

/* 🔥 SMALL POPUP VIDEO */
#videoPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: #111;
  padding: 10px;
  border-radius: 15px;
  z-index: 999;
  transition: 0.3s;
}

#videoPopup.show {
  transform: translate(-50%, -50%) scale(1);
}

#videoPopup video {
  width: 250px; /* small popup */
  border-radius: 10px;
}

#closeVideo {
  margin-top: 5px;
  padding: 5px 10px;
  background: red;
  border: none;
  color: white;
}
</style>
</head>

<body>

<div class="calculator">
  <h2>Calculator 😈</h2>

  <input type="text" id="display" disabled>

  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="append('*')">×</button>
    <button onclick="append('/')">÷</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="calculate()">=</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('0')">0</button>
  </div>
</div>

<!-- 🔥 POPUP VIDEO -->
<div id="videoPopup">
  <video id="myVideo" muted playsinline>
    <source src="carti.mp4" type="video/mp4">
  </video>
  <br>
  <button id="closeVideo" onclick="closeVideo()">Close</button>
</div>

<script>
let display = document.getElementById("display");

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  let exp = display.value;

  if (exp === "7*7") {
    display.value = "49";
    openVideo();
  } 
  else if (exp === "9*9") {
    display.value = "81";
  } 
  else {
    display.value = "Nih help a ant to goon 🐜";
  }
}

function openVideo() {
  let popup = document.getElementById("videoPopup");
  let video = document.getElementById("myVideo");

  popup.classList.add("show");

  video.currentTime = 0;
  video.play();
}

function closeVideo() {
  let popup = document.getElementById("videoPopup");
  let video = document.getElementById("myVideo");

  video.pause();
  popup.classList.remove("show");
}
</script>

</body>
</html>
