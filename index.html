<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Calculator</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    background: #222;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
  }

  input {
    width: 80px;
    padding: 10px;
    margin: 10px;
    font-size: 18px;
    text-align: center;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
  }

  #result {
    margin-top: 20px;
    font-size: 20px;
    color: #00ffcc;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Calculator 😈</h2>

  <input type="number" id="num1" placeholder="First">
  <br>
  <span>×</span>
  <br>
  <input type="number" id="num2" placeholder="Second">

  <br>
  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>
</div>

<script>
function calculate() {
  let a = document.getElementById("num1").value;
  let b = document.getElementById("num2").value;
  let result = document.getElementById("result");

  if (a == 7 && b == 7) {
    result.innerText = "49";
  } 
  else if (a == 9 && b == 9) {
    result.innerText = "81";
  } 
  else {
    result.innerText = "Nih help a ant to goon 🐜";
  }
}
</script>

</body>
</html>
