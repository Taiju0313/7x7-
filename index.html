<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Calculator 😈</title>

<style>
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* Calculator */
.calculator {
  background: #111;
  padding: 20px;
  border-radius: 20px;
}

#display {
  width: 100%;
  height: 60px;
  font-size: 24px;
  text-align: right;
  padding: 10px;
  background: #000;
  color: #0f0;
  border: none;
  margin-bottom: 15px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 70px);
  gap: 10px;
}

button {
  height: 60px;
  border: none;
  border-radius: 12px;
  background: #222;
  color: white;
  font-size: 18px;
  transition: 0.2s;
}

button:active {
  transform: scale(0.9);
}

/* VIDEO SCREEN */
#videoScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#videoScreen video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#closeVideo {
  position: absolute;
  top: 20px;
  right: 20px;
  background: red;
  color: white;
  border: none;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="append('*')">×</button>
    <button onclick="append('/')">÷</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="calculate()">=</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('0')">0</button>
  </div>
</div>

<!-- VIDEO SCREEN -->
<div id="videoScreen">
  <button id="closeVideo" onclick="closeVideo()">X</button>

  <!-- FIXED VIDEO -->
  <video id="myVideo" muted playsinline>
    <source src="carti.mp4" type="video/mp4">
  </video>

</div>

<script>
let display = document.getElementById("display");

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  let exp = display.value;

  if (exp === "7*7") {
    display.value = "49";
    openVideo();
  } 
  else if (exp === "9*9") {
    display.value = "81";
  } 
  else {
    display.value = "Nih help a ant to goon 🐜";
  }
}

function openVideo() {
  let screen = document.getElementById("videoScreen");
  let video = document.getElementById("myVideo");

  screen.style.display = "flex";

  // Mobile autoplay fix
  video.muted = true;
  video.play().then(() => {
    // unmute after start
    video.muted = false;
  }).catch(() => {
    console.log("Autoplay blocked");
  });
}

function closeVideo() {
  let screen = document.getElementById("videoScreen");
  let video = document.getElementById("myVideo");

  video.pause();
  video.currentTime = 0;
  screen.style.display = "none";
}
</script>

</body>
</html>
